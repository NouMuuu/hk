<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-page">
    <div class="auth-card">
        <h1>Регистрация</h1>
        {% if error %}
            <div class="alert error">{{ error }}</div>
        {% endif %}
        <form action="/register" method="POST" accept-charset="UTF-8">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required />
            </div>
            <div class="form-group">
                <label for="login">Логин</label>
                <input type="text" id="login" name="login" required />
            </div>
            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" pattern="^[a-zA-Z0-9]{6,}$" title="Пароль должен содержать буквы и цифры, минимум 6 символов" required />
            </div>
            <div class="form-group">
                <label for="repassword">Подтвердите пароль</label>
                <input type="password" id="repassword" name="repassword" required />
            </div>
            <button type="submit" class="btn-primary">Зарегистрироваться</button>
        </form>
        <div class="link-row">
            <span>Уже есть аккаунт?</span>
            <a href="/login">Войти</a>
        </div>
        <a href="/" class="home-btn">← На главную</a>
    </div>
</body>
</html>
